<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" >
  <rect width="100%" height="100%" fill="white" />
  <!-- Title -->
  <text x="40" y="54" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#1C252E">Learn <tspan font-weight="700">React</tspan></text>

  <!-- Highlighted sentence -->
  <!-- Yellow highlight rectangle behind only the word 'awesome!' -->
  <!-- estimated x/width chosen so the highlight sits behind 'awesome!' only -->
  <rect x="150" y="86" rx="6" ry="6" width="140" height="44" fill="#ffeb3b" />
  <text x="44" y="116" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#000">React is awesome!</text>

  <!-- Small caption -->
  <text x="40" y="164" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#555">Example: highlighted search term inside component content</text>
</svg>
